<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Temperaturas</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .conversor {
            background-color: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        
        .grupo {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .botones {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        
        button:hover {
            transform: scale(0.98);
        }
        
        .btn-celsius {
            background-color: #667eea;
            color: white;
        }
        
        .btn-fahrenheit {
            background-color: #764ba2;
            color: white;
        }
        
        .resultado {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #333;
            border-left: 4px solid #667eea;
        }
        
        .error {
            color: #dc3545;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
        
        .temperatura-resultado {
            font-size: 28px;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="conversor">
        <h1>🌡️ Conversor de Temperaturas</h1>
        
        <div class="grupo">
            <label for="temperatura">Ingresa la temperatura:</label>
            <input type="number" id="temperatura" placeholder="Ej: 25" step="any">
            <div class="error" id="errorMsg">Por favor, ingresa un número válido</div>
        </div>
        
        <div class="botones">
            <button class="btn-celsius" id="aFahrenheit">→ °F (Celsius a Fahrenheit)</button>
            <button class="btn-fahrenheit" id="aCelsius">→ °C (Fahrenheit a Celsius)</button>
        </div>
        
        <div class="resultado" id="resultado">
            Esperando entrada...
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
