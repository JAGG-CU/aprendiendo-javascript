<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi diario de aprendizaje JS</title>
</head>
<body>
    <h1>📗 Aprendiendo JavaScript</h1>
    <p>Abre la consola del navegador (F12 o clic derecho → Inspeccionar → Consola)</p>
    <p>Verás los mensajes de <code>console.log()</code> que escribiste.</p>
    
    <button id="saludarBtn">Saludar</button>
    <p id="mensaje"></p>

    <!-- Cargar tu archivo JavaScript -->
    <script src="variables.js"></script>
    
    <!-- Código adicional para el botón -->
    <script>
        const btn = document.getElementById('saludarBtn');
        const mensaje = document.getElementById('mensaje');
        
        btn.addEventListener('click', () => {
            mensaje.textContent = '¡Botón funcionando! JavaScript está vivo.';
        });
    </script>
</body>
</html>
